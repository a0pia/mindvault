<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" /> <!-- blue-600 -->
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" /> <!-- blue-400 -->
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#grad)" rx="220" />
  
  <!-- The M Letter -->
  <path d="M220 780 V320 L512 600 L804 320 V780" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="100" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        filter="url(#shadow)" />
</svg>
